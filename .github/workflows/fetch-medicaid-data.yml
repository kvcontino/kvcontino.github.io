name: Refresh Medicaid Data
on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch managed care data
        run: |
          curl -s "https://download.medicaid.gov/data/share-of-medicaid-enrollees-in-managed-care.2024-table5.csv" > /tmp/managed-care.csv
          python3 _resources/mcaid/convert_mc.py
          echo "Done"

      - name: Fetch MBES expenditure catalog
        run: |
          curl -s "https://data.medicaid.gov/api/1/metastore/schemas/dataset/items?limit=50&sort=modified" > _resources/mcaid/mbes-catalog.json
          echo "Done"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _resources/mcaid/managed-care.json _resources/mcaid/mbes-catalog.json
          git diff --staged --quiet || git commit -m "chore: refresh Medicaid data $(date +%Y-%m)"
          git pull --rebase
          git push
