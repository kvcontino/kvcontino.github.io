<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>North Country & Adirondack Town Toponyms v2</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #1a1916; --paper: #f5f2ec; --rule: #c8c4ba; --muted: #7a7670; }
  html, body { min-height: 100%; background: var(--paper); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; line-height: 1.5; }
  .page { max-width: 820px; margin: 0 auto; padding: 48px 32px 64px; }
  header { border-top: 2px solid var(--ink); padding-top: 18px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
  h1 { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.2; }
  .byline { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; line-height: 1.8; text-align: right; }
  #status { font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 40px 0 24px; line-height: 2; }
  .s-head { font-weight: 500; font-size: 13px; margin-bottom: 6px; color: var(--ink); }
  .s-ok   { color: #2a6e2a; }
  .s-fail { color: #8a2000; font-weight: 500; }
  .s-wait { color: var(--muted); }
  .map-wrap { border: 1px solid var(--rule); margin-bottom: 20px; }
  .map-wrap svg { display: block; width: 100%; }
  /* legend */
  .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px; margin-bottom: 24px; }
  .leg-row { display: flex; align-items: center; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  .leg-swatch { width: 32px; height: 14px; flex-shrink: 0; border-radius: 2px; border: 1px solid rgba(0,0,0,0.1); }
  .note { background: rgba(0,0,0,0.04); border-left: 3px solid var(--rule); padding: 10px 14px; font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
  #tt { position: fixed; pointer-events: none; z-index: 100; display: none; background: var(--ink); color: var(--paper); padding: 9px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.9; border-radius: 2px; max-width: 220px; }
  .tt-name   { font-weight: 500; font-size: 12px; margin-bottom: 3px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.2); }
  .tt-county { font-size: 10px; color: rgba(245,242,236,0.6); margin-top: -2px; margin-bottom: 3px; }
  .tt-cat    { margin-top: 3px; font-size: 11px; }
  footer { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--rule); font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; line-height: 2; display: flex; flex-wrap: wrap; gap: 0 32px; }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>North Country &amp;<br>Adirondack toponyms</h1>
    <div class="byline">
      Town name origins<br>
      NYS ITS Civil Boundaries<br>
      Hover for detail
    </div>
  </header>

  <div id="status">
    <div class="s-head">Loading&hellip;</div>
    <div id="s-bounds" class="s-wait">&#x22ef;&nbsp; Town &amp; city boundaries</div>
    <div id="s-final"></div>
  </div>

  <div id="map-section" style="display:none">
    <div class="map-wrap" id="wrap"></div>
    <div class="legend" id="legend"></div>
    <div class="note" id="note"></div>
  </div>

  <footer>
    <span>Boundaries: NYS ITS GIS Program Office, Civil Boundaries (Jan 2026)</span>
    <span>Toponym categories: scholarly best judgment; disputed and uncertain cases noted</span>
  </footer>
</div>
<div id="tt"></div>

    // Corrections and additions from review

    'st armand':      ['F'],
    'Henderson':      ['L'],

  /* ── stripe pattern generation ── */
  function catKey(cats) { return cats.slice().sort().join('-'); }

  function ensurePattern(defs, cats) {
    if (cats.length === 1) return CATS[cats[0]].color;
    var id = 'pat-' + catKey(cats);
    if (!defs.select('#' + id).empty()) return 'url(#' + id + ')';
    var colors = cats.map(function(c){ return CATS[c].color; });
    var sw = 5; // stripe width per category
    var total = sw * colors.length;
    var pat = defs.append('pattern')
      .attr('id', id)
      .attr('patternUnits', 'userSpaceOnUse')
      .attr('width', total).attr('height', total)
      .attr('patternTransform', 'rotate(45)');
    colors.forEach(function(col, i) {
      pat.append('rect').attr('x', i * sw).attr('y', 0)
         .attr('width', sw).attr('height', total).attr('fill', col);
    });
    return 'url(#' + id + ')';
  }

  /* ── boundary fetch ── */
  var COUNTY_PREFIXES = ['36019','36031','36033','36035','36041','36043','36045',
                         '36049','36053','36065','36075','36089','36091','36113','36115'];
  var whereClause = COUNTY_PREFIXES
    .map(function(p){ return "FIPS_CODE LIKE '" + p + "%'"; }).join(' OR ');
  var BOUNDS_URL =
    'https://gisservices.its.ny.gov/arcgis/rest/services/NYS_Civil_Boundaries/FeatureServer/6/query' +
    '?where=' + encodeURIComponent(whereClause) +
    '&outFields=NAME,FIPS_CODE,COUNTY,MUNI_TYPE' +
    '&returnGeometry=true&geometryPrecision=5&outSR=4326&resultRecordCount=1000&f=geojson';

  function mark(id, ok, note) {
    var el = document.getElementById(id);
    var base = el.textContent.replace(/^.\u00a0/, '');
    el.className = ok ? 's-ok' : 's-fail';
    el.textContent = (ok ? '\u2713' : '\u2717') + '\u00a0' + base + (note ? ' \u2014 ' + note : '');
  }
  function addStatus(cls, text) {
    var el = document.createElement('div'); el.className = cls; el.textContent = text;
    document.getElementById('s-final').appendChild(el);
  }

  fetch(BOUNDS_URL)
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(function(txt){
      var geo;
      try { geo = JSON.parse(txt); } catch(e){ throw new Error('Not JSON'); }
      mark('s-bounds', true);

      // Assign categories
      var combosFound = new Set();
      geo.features.forEach(function(f){
        var p    = f.properties;
        var name = (p.NAME || '').toLowerCase().trim();
        var cats = TOWNS[name] || [];
        p._name   = p.NAME || '';
        p._county = p.COUNTY || '';
        p._type   = p.MUNI_TYPE || '';
        p._cats   = cats;
        p._key    = catKey(cats);
        if (cats.length > 0) combosFound.add(p._key);
      });

      var classified   = geo.features.filter(function(f){ return f.properties._cats.length > 0; }).length;
      var unclassified = geo.features.length - classified;
      addStatus('s-ok', '\u2713\u00a0Classified ' + classified + ' of ' + geo.features.length
        + ' polygons (' + unclassified + ' unclassified)');

      // Log unclassified for review
      var uncNames = geo.features
        .filter(function(f){ return f.properties._cats.length === 0; })
        .map(function(f){ return f.properties._name + ' (' + f.properties._county + ')'; });
      console.log('Unclassified towns:', uncNames);

      document.getElementById('map-section').style.display = '';
      drawMap(geo);
    })
    .catch(function(err){ mark('s-bounds', false, err.message); });

  /* ── explicit Mercator projection ── */
  function makeProjection(W, H, PAD) {
    var LON_MIN = -76.65, LON_MAX = -73.22;
    var LAT_MIN = 42.82,  LAT_MAX = 45.02;
    function mercY(lat) {
      var phi = lat * Math.PI / 180;
      return Math.log(Math.tan(Math.PI / 4 + phi / 2));
    }
    var xMin = LON_MIN * Math.PI / 180, xMax = LON_MAX * Math.PI / 180;
    var yMin = mercY(LAT_MIN), yMax = mercY(LAT_MAX);
    var sc = Math.min((W-2*PAD)/(xMax-xMin), (H-2*PAD)/(yMax-yMin));
    var drawW = sc*(xMax-xMin), drawH = sc*(yMax-yMin);
    var tx = PAD + (W-2*PAD-drawW)/2 - sc*xMin;
    var ty = PAD + (H-2*PAD-drawH)/2 + sc*yMax;
    return d3.geoTransform({ point: function(lon, lat) {
      this.stream.point(sc*(lon*Math.PI/180)+tx, -sc*mercY(lat)+ty);
    }});
  }

  var tt = document.getElementById('tt');

  function drawMap(geo) {
    var W = 720, H = 860, PAD = 16;
    var proj = makeProjection(W, H, PAD);
    var path = d3.geoPath().projection(proj);

    var svg = d3.select('#wrap').append('svg')
      .attr('viewBox','0 0 '+W+' '+H)
      .style('display','block').style('width','100%');

    var defs = svg.append('defs');
    defs.append('clipPath').attr('id','clip-topo')
      .append('rect').attr('width',W).attr('height',H);

    var g = svg.append('g').attr('clip-path','url(#clip-topo)');

    g.selectAll('path')
      .data(geo.features)
      .join('path')
        .attr('d', function(d){ return path(d)||''; })
        .attr('fill', function(d){
          var cats = d.properties._cats;
          if (cats.length === 0) return '#d8d4cc';
          return ensurePattern(defs, cats);
        })
        .attr('stroke','#f5f2ec')
        .attr('stroke-width', 0.45)
        .style('cursor','pointer')
        .on('mouseover', function(event, d) {
          d3.select(this).attr('stroke','#1a1916').attr('stroke-width',1.5).raise();
          var cats = d.properties._cats;
          var catLabels = cats.length === 0
            ? 'Unclassified'
            : cats.map(function(c){ return CATS[c].label; }).join(' + ');
          tt.innerHTML =
            '<div class="tt-name">'+(d.properties._name||'\u2014')+'</div>'+
            '<div class="tt-county">'+d.properties._county+
              (d.properties._type?' \u00b7 '+d.properties._type:'')+'</div>'+
            '<div class="tt-cat">'+catLabels+'</div>';
          tt.style.display = 'block';
        })
        .on('mousemove', function(event) {
          var x = event.clientX+14, y = event.clientY-10;
          if (x+225 > window.innerWidth) x = event.clientX-230;
          if (y<4) y=4;
          tt.style.left=x+'px'; tt.style.top=y+'px';
        })
        .on('mouseout', function() {
          d3.select(this).attr('stroke','#f5f2ec').attr('stroke-width',0.45);
          tt.style.display='none';
        });

    buildLegend(defs);

    // Summary note
    var counts = {};
    Object.keys(CATS).forEach(function(k){ counts[k] = 0; });
    counts['multi'] = 0; counts['none'] = 0;
    geo.features.forEach(function(f){
      var cats = f.properties._cats;
      if (cats.length === 0) counts['none']++;
      else if (cats.length === 1) counts[cats[0]]++;
      else counts['multi']++;
    });
    var topCat = Object.keys(CATS).reduce(function(a,b){ return counts[a]>counts[b]?a:b; });
    document.getElementById('note').innerHTML =
      'Dominant category: <strong>'+CATS[topCat].label+'</strong> ('+counts[topCat]+' towns) &middot; '
      + counts['multi']+' towns stripe two categories &middot; '
      + counts['none']+' unclassified (gray)';
  }

  function buildLegend(defs) {
    var legEl = document.getElementById('legend');

    // Single categories
    Object.entries(CATS).forEach(function(entry) {
      var key = entry[0], cat = entry[1];
      var row = document.createElement('div'); row.className = 'leg-row';
      var sw  = document.createElement('div'); sw.className = 'leg-swatch';
      sw.style.background = cat.color;
      var lbl = document.createElement('span'); lbl.textContent = cat.label;
      row.append(sw, lbl); legEl.appendChild(row);
    });

    // Combination patterns
    var combos = [
      ['L','P'], ['E','P'], ['B','E'], ['E','G'], ['I','P'], ['I','G'], ['L','G']
    ];
    combos.forEach(function(cats) {
      var fill = ensurePattern(defs, cats);
      var row  = document.createElement('div'); row.className = 'leg-row';
      var sw   = document.createElement('div'); sw.className = 'leg-swatch';

      if (fill.startsWith('url(')) {
        // Render as inline SVG swatch
        sw.style.overflow = 'hidden';
        var svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
        svgEl.setAttribute('width','32'); svgEl.setAttribute('height','14');
        // Copy the pattern def into this swatch SVG
        var patId  = 'swatch-' + catKey(cats);
        var colors = cats.map(function(c){ return CATS[c].color; });
        var sw2    = 5, total = sw2 * colors.length;
        var defsEl = document.createElementNS('http://www.w3.org/2000/svg','defs');
        var patEl  = document.createElementNS('http://www.w3.org/2000/svg','pattern');
        patEl.setAttribute('id', patId);
        patEl.setAttribute('patternUnits','userSpaceOnUse');
        patEl.setAttribute('width', total); patEl.setAttribute('height', total);
        patEl.setAttribute('patternTransform','rotate(45)');
        colors.forEach(function(col, i) {
          var r = document.createElementNS('http://www.w3.org/2000/svg','rect');
          r.setAttribute('x', i*sw2); r.setAttribute('y',0);
          r.setAttribute('width',sw2); r.setAttribute('height',total);
          r.setAttribute('fill',col); patEl.appendChild(r);
        });
        defsEl.appendChild(patEl); svgEl.appendChild(defsEl);
        var rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('width','32'); rect.setAttribute('height','14');
        rect.setAttribute('fill','url(#'+patId+')');
        rect.setAttribute('rx','2');
        svgEl.appendChild(rect);
        sw.appendChild(svgEl);
      } else {
        sw.style.background = fill;
      }

      var lbl = document.createElement('span');
      lbl.textContent = cats.map(function(c){ return CATS[c].label; }).join(' + ');
      row.append(sw, lbl); legEl.appendChild(row);
    });

    // Unclassified
    var row = document.createElement('div'); row.className = 'leg-row';
    var sw  = document.createElement('div'); sw.className = 'leg-swatch';
    sw.style.background = '#d8d4cc';
    var lbl = document.createElement('span'); lbl.textContent = 'Unclassified';
    row.append(sw, lbl); legEl.appendChild(row);
  }

})();
</script>
</body>
</html>
